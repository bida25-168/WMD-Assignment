<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Debate Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .feedback-page-container {
            max-width: 550px;
            margin: 60px auto;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border-left: 5px solid #ffd700;
        }
        .feedback-page-container h1 {
            color: #800000;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 15px;
        }
        .btn-submit {
            background-color: #800000;
            color: white;
            border: 2px solid #ffd700;
            padding: 12px;
            border-radius: 5px;
            width: 100%;
            font-weight: bold;
        }
        .btn-submit:hover {
            background-color: #660000;
        }
        .error-message {
            color: #800000;
            font-size: 0.8rem;
            display: none;
        }
        .required{
            color:#800000;
            margin-left: 5px;
        }
        .form-group{
            margin-bottom: 20px;
        }
        label{
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 8px;
        }
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Your navigation bar here -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">DEBATERSWITHOUTBORDERS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Types of debates</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="tips.html">Debate Tips</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <div class="feedback-page-container">
            <h1>Give Feedback</h1>
            
            <div id="successMessage" class="success-message">
                ✓ Thank you for your feedback!
            </div>

            <form id="feedbackForm">
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com">
                    <div class="error-message" id="emailError">Please enter a valid email.</div>
                </div>

                <div class="form-group">
                    <label for="category">Category <span class="required">*</span></label>
                    <select id="category" class="form-control">
                        <option value="">Select One...</option>
                        <option value="bugs">Bugs / Issues</option>
                        <option value="praise">General Praise</option>
                        <option value="feature">Feature Idea</option>
                        <option value="other">Other</option>
                    </select>
                    <div class="error-message" id="categoryError">Please select a category.</div>
                </div>

                <div class="form-group">
                    <label for="message">Your Message <span class="required">*</span></label>
                    <textarea id="message" class="form-control" rows="5" placeholder="Tell us what you think..."></textarea>
                    <div class="error-message" id="messageError">Please enter your message.</div>
                </div>

                <button type="submit" class="btn-submit">Send Feedback</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 DEBATERSWITHOUTBORDERS. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const feedbackForm = document.getElementById('feedbackForm');
        const successMessage = document.getElementById('successMessage');

        feedbackForm.onsubmit = function(e) {
            e.preventDefault();
            
            let isValid = true;
            const email = document.getElementById('email').value;
            const category = document.getElementById('category').value;
            const message = document.getElementById('message').value;

            const emailError = document.getElementById('emailError');
            if (email === '' || !email.includes('@')) {
                emailError.style.display = 'block';
                isValid = false;
            } else {
                emailError.style.display = 'none';
            }

            const categoryError = document.getElementById('categoryError');
            if (category === '') {
                categoryError.style.display = 'block';
                isValid = false;
            } else {
                categoryError.style.display = 'none';
            }

            const messageError = document.getElementById('messageError');
            if (message === '') {
                messageError.style.display = 'block';
                isValid = false;
            } else {
                messageError.style.display = 'none';
            }

            if (isValid) {
                document.querySelector('.feedback-page-container form').style.display = 'none';
                successMessage.style.display = 'block';
                
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 2000);
            }
        };
    </script>
</body>
</html>
